slug: trust-risk-benchmark
name: Trust & Risk Benchmark
version: "0.1"
status: beta

business_question: |
  ¿Qué entidades generan más confianza o riesgo reputacional y qué temas
  pueden escalar?

inputs:
  corpus:
    minimum_viable: 1200
    ideal: 5000
  competitive_corpus:
    required: true

outputs:
  - id: trust_score
    name: Trust Score Benchmark
    type: gauge
  - id: risk_theme_ranking
    name: Risk Theme Ranking
    type: diverging_bar
  - id: escalation_alerts
    name: Escalation Alerts
    type: timeline

default_dashboard_blocks:
  - block_id: trust_score
  - block_id: risk_theme_ranking
  - block_id: escalation_alerts
  - block_id: confidence_layer

quality_gates:
  - id: risk_quote_required
    description: "Cada riesgo publicado tiene cita o evidencia verificable."
  - id: no_unverified_accusations
    description: "No se publican acusaciones sensibles sin evidencia trazable."
  - id: confidence_calibrated
    description: "Cada tema lleva confianza."

ai_prompts:
  engine_spec: trust-risk-benchmark
