<!-- slide: finding · Hallazgo con evidencia · variants: light -->
<section class="slide" data-label="Hallazgo">
  <div class="frame">
    <div class="slide-header">
      <div class="left"><img class="logo" src="logo_norm.svg" alt="Noisia"></div>
      <div class="right"><span>hallazgo · evidencia trazable</span></div>
    </div>
    <span class="eyebrow tension">· {{EYEBROW}}</span>
    <h2 class="title" style="max-width:1500px; margin:var(--gap-item) 0 var(--gap-title);">{{CLAIM}}</h2>
    <div style="display:grid; grid-template-columns:1.4fr 0.6fr; gap:60px; align-items:start; flex:1;">
      <blockquote style="margin:0; border-left:4px solid var(--signal); padding-left:32px;">
        <p class="body" style="font-size:34px; font-style:italic;">"{{EVIDENCE_QUOTE}}"</p>
        <span class="body" style="font-size:22px; color:var(--fg-secondary);">— {{EVIDENCE_SOURCE}}</span>
      </blockquote>
      <div class="col gap-item">
        <span class="eyebrow positive">· confianza</span>
        <span style="font-size:64px; font-weight:600;">{{CONFIDENCE}}</span>
      </div>
    </div>
    <div class="slide-footer"><span>noisia · social intelligence architects</span><span>{{FOOTER_NN}} / {{FOOTER_TOTAL}}</span></div>
  </div>
</section>
