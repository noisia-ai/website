<!-- slide: three-up · Tres columnas · variants: light -->
<section class="slide" data-label="Tres columnas">
  <div class="frame">
    <div class="slide-header">
      <div class="left"><img class="logo" src="logo_norm.svg" alt="Noisia"></div>
      <div class="right"><span>noisia.ai</span></div>
    </div>
    <h2 class="title" style="margin-bottom:var(--gap-title);">{{TITLE}}</h2>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:48px; flex:1;">
      <div class="col gap-item">
        <span class="eyebrow signal">· {{COL1_TAG}}</span>
        <h3 style="font-size:40px; margin:0;">{{COL1_TITLE}}</h3>
        <p class="body">{{COL1_BODY}}</p>
      </div>
      <div class="col gap-item">
        <span class="eyebrow signal">· {{COL2_TAG}}</span>
        <h3 style="font-size:40px; margin:0;">{{COL2_TITLE}}</h3>
        <p class="body">{{COL2_BODY}}</p>
      </div>
      <div class="col gap-item">
        <span class="eyebrow signal">· {{COL3_TAG}}</span>
        <h3 style="font-size:40px; margin:0;">{{COL3_TITLE}}</h3>
        <p class="body">{{COL3_BODY}}</p>
      </div>
    </div>
    <div class="slide-footer"><span>noisia · social intelligence architects</span><span>{{FOOTER_NN}} / {{FOOTER_TOTAL}}</span></div>
  </div>
</section>
