<!-- slide: cover · Portada · variants: light|dark -->
<section class="slide" data-label="01 Portada">
  <div class="atmos"></div>
  <div class="frame">
    <div class="slide-header">
      <div class="left"><img class="logo" src="logo_norm.svg" alt="Noisia"></div>
      <div class="right"><span>noisia.ai</span></div>
    </div>
    <div class="cover-grid">
      <div class="col gap-title" style="justify-content:flex-end;">
        <span class="eyebrow signal">· {{EYEBROW}}</span>
        <h1 class="title display">{{TITLE}}</h1>
        <p class="body" style="font-size:34px; max-width:900px;">{{SUBTITLE}}</p>
      </div>
      <div class="cover-meta">
        <div class="row-meta"><span>para</span><b>· {{META_FOR}}</b></div>
        <div class="row-meta"><span>fecha</span><b>· {{META_DATE}}</b></div>
      </div>
    </div>
    <div class="slide-footer"><span>noisia · social intelligence architects</span><span>{{FOOTER_NN}} / {{FOOTER_TOTAL}}</span></div>
  </div>
</section>
